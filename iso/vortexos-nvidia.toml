# ============================================================
# vortexos-nvidia.toml — blueprint per bootc-image-builder (variante NVIDIA)
#
# L'immagine ghcr.io/dexmodzz/vortexos-nvidia include i driver NVIDIA
# compilati con akmods al momento della build OCI.
# Quando il kernel CachyOS viene aggiornato, GitHub Actions ri-builda
# l'immagine e ri-compila il modulo nvidia — niente DKMS runtime.
# "sudo bootc upgrade" aggiorna kernel + driver NVIDIA insieme.
# ============================================================

[customizations.installer.kickstart]
contents = """
%post
# Punta il sistema all'immagine vortexos-nvidia (con driver NVIDIA baked-in).
# Da questo momento "sudo bootc upgrade" mantiene kernel e driver in sync.
bootc switch --mutate-in-place --transport registry ghcr.io/dexmodzz/vortexos-nvidia:latest
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Subscription"
]
