name: Build ISO Installabile

on:
  # Manuale: scegli la variante
  workflow_dispatch:
    inputs:
      variant:
        description: "Variante da buildare"
        required: true
        default: "base"
        type: choice
        options:
          - base
          - nvidia
          - both

  # Automatico dopo build.yml completato con successo su main
  workflow_run:
    workflows: ["Build & Push OCI Image"]
    types: [completed]
    branches: [main]

jobs:
  # ── Decide quali varianti buildare ───────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      skip:   ${{ steps.set.outputs.skip }}
    steps:
      - name: Determina varianti
        id: set
        run: |
          EVENT="${{ github.event_name }}"
          VARIANT="${{ github.event.inputs.variant }}"

          # Se triggerato da workflow_run, salta se il workflow upstream è fallito
          if [ "${EVENT}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
              echo "Build upstream fallita — ISO build saltata."
              exit 0
            fi
            VARIANT="base"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          case "${VARIANT}" in
            base)
              echo 'matrix={"include":[{"variant":"base","suffix":"","config":"iso/vortexos.toml"}]}' >> "$GITHUB_OUTPUT"
              ;;
            nvidia)
              echo 'matrix={"include":[{"variant":"nvidia","suffix":"-nvidia","config":"iso/vortexos-nvidia.toml"}]}' >> "$GITHUB_OUTPUT"
              ;;
            both)
              echo 'matrix={"include":[{"variant":"base","suffix":"","config":"iso/vortexos.toml"},{"variant":"nvidia","suffix":"-nvidia","config":"iso/vortexos-nvidia.toml"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  build-iso:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    permissions:
      contents: write   # per caricare asset nella Release
      packages: read    # per pullare l'immagine da ghcr.io

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. Login ghcr.io ─────────────────────────────────────────
      # docker/login-action scrive le credenziali in ~/.docker/config.json.
      # Questo file viene montato dentro bootc-image-builder nel passo 5
      # così il container può pullare l'immagine vortexos da ghcr.io.
      - name: Login su ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Installa podman ───────────────────────────────────────
      - name: Installa podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman
          podman --version

      # ── 4. Prepara directory output ──────────────────────────────
      - name: Prepara directory output
        run: mkdir -p output

      # ── 5. Build ISO con bootc-image-builder ─────────────────────
      # Boot ordine operazioni:
      # a) podman pull esplicito dell'immagine vortexos (usa le credenziali
      #    già configurate da docker/login-action nel passo 2)
      # b) bootc-image-builder con --local (usa l'immagine già pullata)
      #    così non deve ri-autenticarsi autonomamente
      #
      # Note sicurezza:
      # - label=disable: Ubuntu usa AppArmor, non SELinux → label=type:unconfined_t
      #   (opzione SELinux) causerebbe errore sul runner ubuntu-latest
      # - --privileged: necessario per loop devices usati da osbuild
      - name: "Pull immagine OCI (${{ matrix.variant }})"
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          IMAGE="ghcr.io/${OWNER,,}/${REPO,,}${{ matrix.suffix }}:latest"
          echo "Pulling: ${IMAGE}"
          sudo podman pull "${IMAGE}"

      - name: "Build ISO (${{ matrix.variant }})"
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          IMAGE="ghcr.io/${OWNER,,}/${REPO,,}${{ matrix.suffix }}:latest"
          CONFIG="${{ matrix.config }}"

          echo "Immagine: ${IMAGE}"
          echo "Config:   ${CONFIG}"

          sudo podman run --rm \
            --privileged \
            --security-opt label=disable \
            -v "$(pwd)/output:/output" \
            -v "$(pwd)/${CONFIG}:/config.toml:ro" \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            ghcr.io/osbuild/bootc-image-builder:latest \
            --type anaconda-iso \
            --config /config.toml \
            --local \
            "${IMAGE}"

      # ── 6. Rinomina ISO ───────────────────────────────────────────
      - name: Rinomina ISO
        id: iso
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          SHA="${GITHUB_SHA::7}"
          SUFFIX="${{ matrix.suffix }}"

          ISO_SRC="$(find output -name '*.iso' | head -n1)"
          if [ -z "${ISO_SRC}" ]; then
            echo "ERRORE: nessuna ISO trovata in output/"
            find output -type f
            exit 1
          fi

          ISO_NAME="vortexos${SUFFIX}-${DATE}-${SHA}.iso"
          mv "${ISO_SRC}" "${ISO_NAME}"

          SIZE="$(du -h "${ISO_NAME}" | cut -f1)"
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"
          echo "iso_size=${SIZE}"     >> "$GITHUB_OUTPUT"
          echo "ISO pronta: ${ISO_NAME} (${SIZE})"

      # ── 7. Carica su GitHub Release ──────────────────────────────
      - name: "Pubblica ISO su GitHub Release (${{ matrix.variant }})"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "iso-${{ github.run_number }}"
          name: "vortexos ISO — build ${{ github.run_number }}"
          draft: false
          prerelease: false
          files: ${{ steps.iso.outputs.iso_name }}
          body: |
            ## vortexos ISO — build ${{ github.run_number }}

            | Campo | Valore |
            |---|---|
            | Variante | `${{ matrix.variant }}` |
            | Immagine OCI | `ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}${{ matrix.suffix }}:latest` |
            | Commit | `${{ github.sha }}` |
            | Dimensione | ${{ steps.iso.outputs.iso_size }} |

            ### Come usare questa ISO

            **1. Scrivi su chiavetta USB:**
            ```bash
            sudo dd if=${{ steps.iso.outputs.iso_name }} of=/dev/sdX bs=4M status=progress && sync
            ```
            *(usa `lsblk` per identificare la tua chiavetta — sostituisci `/dev/sdX`)*

            **2. Avvia dal dispositivo USB** — parte Anaconda in modalità minimal

            **3. Installa** — al termine, il kickstart esegue automaticamente:
            ```bash
            bootc switch ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}${{ matrix.suffix }}:latest
            ```

            **4. Riavvia** — il sistema è vortexos completo. Aggiornamenti futuri:
            ```bash
            sudo bootc upgrade && sudo reboot
            ```

            ---
            > ℹ️ Anaconda usa solo i moduli Storage e Runtime — rete, utenti,
            > timezone vengono configurati dal sistema dopo il primo avvio.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
