name: Build & Push OCI Image

on:
  push:
    branches: ["main"]
  pull_request:
    types: [closed]
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    runs-on: ubuntu-latest

    # Matrix: base (senza NVIDIA) e nvidia.
    # fail-fast: false → se nvidia fallisce (akmods lento/problematico)
    # la variante base viene comunque pushata.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            image_suffix: ""         # → ghcr.io/dexmodzz/vortexos
            build_arg: zena          # caso in build.sh
          - variant: nvidia
            image_suffix: "-nvidia"  # → ghcr.io/dexmodzz/vortexos-nvidia
            build_arg: zena-nvidia

    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless OIDC

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. Calcola nome immagine e tag ────────────────────────────
      # Tre tag: latest, YYYY-MM-DD, SHA corto (7 char).
      # Vengono salvati come stringhe semplici (senza il prefisso registry)
      # e poi combinati con IMAGE_BASE nei passi successivi.
      - name: Calcola tag immagine
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SUFFIX="${{ matrix.image_suffix }}"

          # ghcr.io richiede tutto minuscolo
          IMAGE_BASE="ghcr.io/${OWNER,,}/${REPO,,}${SUFFIX}"
          DATE="$(date -u +%Y-%m-%d)"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"             >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"   >> "$GITHUB_OUTPUT"

      # ── 3. Login ghcr.io ─────────────────────────────────────────
      - name: Login su ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Cosign ────────────────────────────────────────────────
      - name: Installa cosign
        uses: sigstore/cosign-installer@v3

      # ── 5. Build con buildah ──────────────────────────────────────
      # FEDORA_VERSION=43: solopasha/hyprland (fc43) richiede libdisplay-info.so.2.
      # F43 ha 0.2.0 (.so.2); F44/F45 hanno 0.3.0 (.so.3) incompatibile.
      # IMAGE seleziona il caso in build.sh (zena | zena-nvidia).
      - name: "Build OCI (${{ matrix.variant }})"
        run: |
          IMAGE="${{ steps.tags.outputs.image_base }}"
          DATE="${{ steps.tags.outputs.date }}"
          SHA="${{ steps.tags.outputs.short_sha }}"

          buildah bud \
            --layers \
            --build-arg FEDORA_VERSION=43 \
            --build-arg IMAGE=${{ matrix.build_arg }} \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${DATE}" \
            --tag "${IMAGE}:${SHA}" \
            .

      # ── 6. Push ───────────────────────────────────────────────────
      - name: "Push su ghcr.io (${{ matrix.variant }})"
        id: push
        run: |
          IMAGE="${{ steps.tags.outputs.image_base }}"
          DATE="${{ steps.tags.outputs.date }}"
          SHA="${{ steps.tags.outputs.short_sha }}"

          for TAG in "latest" "${DATE}" "${SHA}"; do
            buildah push \
              --digestfile "/tmp/digest-${TAG}.txt" \
              "${IMAGE}:${TAG}" \
              "docker://${IMAGE}:${TAG}"
          done

          # Digest del tag latest usato per la firma cosign
          echo "digest=$(cat /tmp/digest-latest.txt)" >> "$GITHUB_OUTPUT"

      # ── 7. Firma keyless ─────────────────────────────────────────
      # Identità verificabile via: cosign verify ghcr.io/dexmodzz/vortexos:latest
      - name: "Firma con cosign (${{ matrix.variant }})"
        run: |
          cosign sign --yes \
            "${{ steps.tags.outputs.image_base }}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"

      # ── 8. Riepilogo ─────────────────────────────────────────────
      - name: "Riepilogo (${{ matrix.variant }})"
        run: |
          IMAGE="${{ steps.tags.outputs.image_base }}"
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  ✓ ${IMAGE}:latest pushata"
          echo "  Primo switch:  sudo bootc switch ${IMAGE}:latest"
          echo "  Aggiornamenti: sudo bootc upgrade && sudo reboot"
          echo "  Rollback:      sudo bootc rollback && sudo reboot"
          echo "═══════════════════════════════════════════════"
