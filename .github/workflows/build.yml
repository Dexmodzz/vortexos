name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  # ── Build OCI + Push + Sign ───────────────────────────────────
  build-oci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            target: vortexos
            suffix: ""
          - variant: nvidia
            target: vortexos-nvidia
            suffix: "-nvidia"

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calcola tag immagine
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          IMAGE_BASE="ghcr.io/${OWNER,,}/${REPO,,}${{ matrix.suffix }}"
          DATE="$(date -u +%Y-%m-%d)"
          SHA="${GITHUB_SHA::7}"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"             >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"               >> "$GITHUB_OUTPUT"

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Installa cosign
        uses: sigstore/cosign-installer@v3

      - name: Build OCI (${{ matrix.variant }})
        run: |
          IMAGE="${{ steps.tags.outputs.image_base }}"
          DATE="${{ steps.tags.outputs.date }}"
          SHA="${{ steps.tags.outputs.sha }}"
          buildah bud \
            --no-cache \
            --pull-always \
            --target "${{ matrix.target }}" \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${DATE}" \
            --tag "${IMAGE}:${SHA}" \
            .

      - name: Push su ghcr.io (${{ matrix.variant }})
        id: push
        run: |
          IMAGE="${{ steps.tags.outputs.image_base }}"
          DATE="${{ steps.tags.outputs.date }}"
          SHA="${{ steps.tags.outputs.sha }}"
          for TAG in latest "${DATE}" "${SHA}"; do
            buildah push \
              --digestfile "/tmp/digest-${TAG}.txt" \
              "${IMAGE}:${TAG}" \
              "docker://${IMAGE}:${TAG}"
          done
          echo "digest=$(cat /tmp/digest-latest.txt)" >> "$GITHUB_OUTPUT"

      - name: Firma cosign keyless (${{ matrix.variant }})
        run: |
          cosign sign --yes \
            "${{ steps.tags.outputs.image_base }}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"

  # ── Build ISO + Upload R2 ─────────────────────────────────────
  build-iso:
    needs: build-oci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            suffix: ""
          - variant: nvidia
            suffix: "-nvidia"

    permissions:
      contents: read
      packages: read

    steps:
      - name: Installa podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman

      - name: Installa AWS CLI v2
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
          aws --version

      - name: Login ghcr.io (root)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Pull immagine OCI (${{ matrix.variant }})
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          IMAGE="ghcr.io/${OWNER,,}/${REPO,,}${{ matrix.suffix }}:latest"
          sudo podman pull "${IMAGE}"

          # bootc-image-builder richiede ID=fedora per rilevare la distro
          LOCAL="${IMAGE}-bib"
          CTR=$(sudo podman create "${IMAGE}" /bin/true)
          sudo podman cp "${CTR}:/usr/lib/os-release" /tmp/os-release
          sudo sed -i 's/^ID=.*/ID=fedora/' /tmp/os-release
          sudo podman cp /tmp/os-release "${CTR}:/usr/lib/os-release"
          sudo podman commit "${CTR}" "${LOCAL}"
          sudo podman rm "${CTR}"

          echo "LOCAL_IMAGE=${LOCAL}" >> "$GITHUB_ENV"

      - name: Build ISO (${{ matrix.variant }})
        run: |
          mkdir -p output
          sudo podman run --rm \
            --privileged \
            --security-opt label=disable \
            -v "$(pwd)/output:/output" \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            ghcr.io/osbuild/bootc-image-builder:latest \
            --type anaconda-iso \
            --rootfs xfs \
            --local \
            "${LOCAL_IMAGE}"

      - name: Upload ISO su Cloudflare R2 (${{ matrix.variant }})
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          SHA="${GITHUB_SHA::7}"
          ISO_SRC=$(find output -name '*.iso' | head -1)
          ISO_NAME="vortexos${{ matrix.suffix }}-${DATE}-${SHA}.iso"
          sudo mv "${ISO_SRC}" "${ISO_NAME}"
          aws s3 cp "${ISO_NAME}" \
            "s3://${{ secrets.CF_R2_BUCKET }}/${ISO_NAME}" \
            --endpoint-url "${{ secrets.CF_R2_ENDPOINT }}"
          echo "ISO: ${{ secrets.CF_R2_ENDPOINT }}/${ISO_NAME}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
