name: Sync Upstream Zena

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Legge SHA upstream via GitHub API ────────────────────────
      - name: Leggi SHA upstream
        id: upstream
        run: |
          SHA=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/Zena-Linux/Zena/commits/main" \
            | jq -r '.sha')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Upstream: ${SHA}"

      # ── Legge SHA memorizzato nel repo ───────────────────────────
      - name: Leggi SHA memorizzato
        id: stored
        run: |
          # Ignora commenti e righe vuote
          SHA=$(grep -v '^#' .upstream-sha | grep -v '^[[:space:]]*$' | head -n1 || true)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Stored: ${SHA:-<nessuno>}"

      # ── Confronta SHA ────────────────────────────────────────────
      - name: Controlla se sync necessario
        id: check
        run: |
          UP="${{ steps.upstream.outputs.sha }}"
          ST="${{ steps.stored.outputs.sha }}"

          if [ "${UP}" = "${ST}" ]; then
            echo "in_sync=true" >> "$GITHUB_OUTPUT"
            echo "Già in sync — nessuna azione."
          elif [ -z "${ST}" ]; then
            # Prima esecuzione: salva solo il baseline senza applicare nulla.
            # Il confronto da zero causerebbe l'applicazione di tutti i file
            # upstream, sovrascrivendo le nostre personalizzazioni.
            echo "in_sync=first_run" >> "$GITHUB_OUTPUT"
            echo "Prima esecuzione: registro il baseline SHA senza applicare diff."
          else
            echo "in_sync=false" >> "$GITHUB_OUTPUT"
            echo "Aggiornamento: ${ST::8} → ${UP::8}"
          fi

      # ── Prima esecuzione: registra solo il baseline SHA ──────────
      - name: Registra baseline SHA (prima esecuzione)
        if: steps.check.outputs.in_sync == 'first_run'
        run: |
          SHA="${{ steps.upstream.outputs.sha }}"
          printf '# SHA upstream baseline — non modificare manualmente\n%s\n' "${SHA}" > .upstream-sha
          git add .upstream-sha
          git commit -m "chore: registra SHA upstream baseline Zena"
          git push

      # ── Fetch upstream ───────────────────────────────────────────
      - name: Fetch upstream Zena
        if: steps.check.outputs.in_sync == 'false'
        run: |
          git remote add upstream https://github.com/Zena-Linux/Zena.git
          git fetch upstream main --no-tags

      # ── Determina file cambiati ──────────────────────────────────
      - name: Determina file cambiati
        if: steps.check.outputs.in_sync == 'false'
        id: changes
        run: |
          ST="${{ steps.stored.outputs.sha }}"
          # Solo i path che non sono nelle nostre zone protette
          CHANGED=$(git diff --name-only "${ST}...upstream/main" -- \
            build-scripts/ patches/ 2>/dev/null || true)
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "File cambiati: ${CHANGED:-<nessuno>}"

      # ── Applica modifiche ────────────────────────────────────────
      - name: Applica modifiche non protette
        if: steps.check.outputs.in_sync == 'false'
        id: apply
        run: |
          UP="${{ steps.upstream.outputs.sha }}"
          DATE="$(date -u +%Y-%m-%d)"
          BRANCH="sync/upstream-${DATE}"

          git checkout -b "${BRANCH}"

          # Carica file protetti (ignora commenti e righe vuote)
          mapfile -t PROTECTED < <(grep -v '^#' PROTECTED_FILES.txt | grep -v '^[[:space:]]*$' | sed 's|/$||')

          is_protected() {
            local f="$1"
            for p in "${PROTECTED[@]}"; do
              [[ "${f}" == "${p}" || "${f}" == "${p}/"* ]] && return 0
            done
            return 1
          }

          APPLIED=""
          SKIPPED=""
          NEAR_CUSTOM=""

          while IFS= read -r file; do
            [ -z "${file}" ] && continue

            if is_protected "${file}"; then
              SKIPPED="${SKIPPED}- \`${file}\` *(protetto)*\n"
              continue
            fi

            # Avvisa se il file è vicino alle zone personalizzate
            if [[ "${file}" == build-scripts/modules/de/* || "${file}" == "Containerfile" ]]; then
              NEAR_CUSTOM="${NEAR_CUSTOM}- \`${file}\` ⚠️ zona personalizzata — controlla il diff\n"
            fi

            if git show "upstream/main:${file}" > /tmp/upstream_file 2>/dev/null; then
              mkdir -p "$(dirname "${file}")"
              cp /tmp/upstream_file "${file}"
              git add "${file}"
              APPLIED="${APPLIED}- \`${file}\`\n"
            else
              SKIPPED="${SKIPPED}- \`${file}\` *(non in upstream)*\n"
            fi
          done <<< "${{ steps.changes.outputs.changed }}"

          # Aggiorna SHA tracciato
          printf '# SHA upstream — non modificare manualmente\n%s\n' "${UP}" > .upstream-sha
          git add .upstream-sha

          echo "branch=${BRANCH}"   >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"       >> "$GITHUB_OUTPUT"

          # Salva risultati in file per il passo PR (evita problemi heredoc)
          printf '%b' "${APPLIED:-*(nessun file applicato)*}" > /tmp/applied.txt
          printf '%b' "${SKIPPED:-*(nessun file skippato)*}"  > /tmp/skipped.txt
          printf '%b' "${NEAR_CUSTOM}"                        > /tmp/near_custom.txt

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Commit e push ────────────────────────────────────────────
      - name: Commit branch di sync
        if: >
          steps.check.outputs.in_sync == 'false' &&
          steps.apply.outputs.has_changes == 'true'
        run: |
          DATE="${{ steps.apply.outputs.date }}"
          UP="${{ steps.upstream.outputs.sha }}"
          git commit -m "chore: sync upstream Zena ${DATE} (${UP::8})"
          git push origin "${{ steps.apply.outputs.branch }}"

      # ── Apri PR ──────────────────────────────────────────────────
      - name: Apri Pull Request
        if: >
          steps.check.outputs.in_sync == 'false' &&
          steps.apply.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UP="${{ steps.upstream.outputs.sha }}"
          DATE="${{ steps.apply.outputs.date }}"
          BRANCH="${{ steps.apply.outputs.branch }}"

          APPLIED="$(cat /tmp/applied.txt)"
          SKIPPED="$(cat /tmp/skipped.txt)"
          NEAR="$(cat /tmp/near_custom.txt)"

          # Costruisce warning condizionale
          if [ -n "${NEAR// /}" ]; then
            WARN="## ⚠️ Zone vicine alle personalizzazioni
          Controlla attentamente prima del merge:
          ${NEAR}"
          else
            WARN="*Nessun file vicino alle personalizzazioni vortexos.*"
          fi

          # Scrive body su file — evita problemi con heredoc e variabili multiline
          cat > /tmp/pr_body.md << PREOF
          ## Sync automatico da upstream Zena

          **Commit upstream:** [\`${UP::8}\`](https://github.com/Zena-Linux/Zena/commit/${UP})
          **Data:** ${DATE}

          ---

          ## File aggiornati
          ${APPLIED}

          ## File skippati (protetti o non trovati)
          ${SKIPPED}

          ---

          ${WARN}

          ---

          > Generato da \`.github/workflows/sync-upstream.yml\`
          > Controlla il diff prima di fare merge.
          PREOF

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: sync upstream Zena ${DATE}" \
            --body-file /tmp/pr_body.md

      # ── Log finale ───────────────────────────────────────────────
      - name: Già in sync
        if: steps.check.outputs.in_sync == 'true'
        run: echo "Il fork è già allineato con upstream. Nessuna PR aperta."
