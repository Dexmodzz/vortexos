# ================================================================
# /etc/hypr/hyprland.conf — config di sistema VortexOS
# Gli utenti possono sovrascrivere con ~/.config/hypr/hyprland.conf
# ================================================================

monitor = , preferred, auto, 1

$terminal   = kitty
$launcher   = wofi --show drun
$lockScreen = hyprlock

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

input {
    kb_layout  = it
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
        tap-to-click   = true
    }
}

general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size    = 3
        passes  = 1
    }
}

animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    animation = windows,    1, 7, smooth
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fade,       1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = true
}

# Avvio sessione: D-Bus + hyprland-session.target per DMS
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprland-session.target
exec-once = hyprpaper
exec-once = dunst
exec-once = hypridle
exec-once = waybar

$mainMod = SUPER

bind = $mainMod,       Return, exec,           $terminal
bind = $mainMod,       Q,      killactive,
bind = $mainMod,       E,      exec,           nautilus
bind = $mainMod,       R,      exec,           $launcher
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       F,      fullscreen,     0
bind = $mainMod,       L,      exec,           $lockScreen
bind = $mainMod SHIFT, M,      exit,
bind = , Print,         exec,  grimblast copy area

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp,  exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown,exec, brightnessctl set 5%-
