# ============================================================
# hypridle.conf — idle management vortexos
# Posizione nel sistema: /etc/hypr/hypridle.conf
# ============================================================
#
# Sequenza:
#   5 min  → spegni schermo (dpms off)
#  10 min  → blocca schermo con hyprlock
#  Al risveglio → riaccendi schermo (dpms on)
#  Prima del suspend → blocca schermo

general {
    # Comando eseguito al lock (hyprlock è il locker Hyprland nativo)
    lock_cmd         = pidof hyprlock || hyprlock
    # Blocca prima di andare in suspend
    before_sleep_cmd = loginctl lock-session
    # Riaccendi schermo dopo il risveglio
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# Spegni schermo dopo 5 minuti di inattività
listener {
    timeout    = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Blocca lo schermo dopo 10 minuti di inattività
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}
