# ============================================================
# hyprpaper.conf — gestione sfondo vortexos
# Posizione nel sistema: /etc/hypr/hyprpaper.conf
# ============================================================

# TODO: sostituisci il percorso con il tuo wallpaper preferito.
# Il file deve esistere nell'immagine; puoi aggiungerlo in
# system-files/custom/usr/share/backgrounds/ e poi referenziarlo qui.
#
# Esempio con wallpaper incluso nell'immagine:
preload = /usr/share/backgrounds/default.png
wallpaper = , /usr/share/backgrounds/default.png

# splash = false  # disabilita il messaggio di avvio di hyprpaper
