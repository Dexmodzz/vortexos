# ============================================================
# hyprland.conf — configurazione base vortexos
# Posizione nel sistema: /etc/hypr/hyprland.conf
# Questa è la config di sistema; l'utente può sovrascriverla
# mettendo ~/.config/hypr/hyprland.conf nella home.
# ============================================================

# --- Monitor ---
# "preferred" usa la risoluzione nativa, "auto" posiziona in automatico
monitor = , preferred, auto, 1

# --- Programmi di default ---
$terminal   = kitty
$launcher   = wofi --show drun
$fileManager = nautilus
$lockScreen  = hyprlock

# --- Variabili d'ambiente Wayland ---
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
# Qt — forza il backend Wayland (già in /etc/environment, ridondante ma esplicito)
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, gtk3
# Electron — usa Ozone/Wayland automaticamente
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# --- Input ---
input {
    # Layout tastiera italiano
    kb_layout  = it
    kb_variant =
    kb_options =

    # Il focus segue il mouse senza click
    follow_mouse = 1
    sensitivity  = 0       # 0 = nessuna accelerazione extra

    touchpad {
        natural_scroll   = true
        tap-to-click     = true
        drag_lock        = true
        scroll_method    = 2fg   # due dita per scrollare
    }
}

# --- Aspetto generale ---
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size    = 3
        passes  = 1
    }

    drop_shadow      = true
    shadow_range     = 4
    shadow_render_power = 3
    col.shadow       = rgba(1a1a1aee)
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,    1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border,     1, 10, default
    animation = fade,       1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_is_master = true
}

# --- Autostart ---
exec-once = waybar --config /etc/waybar/config --style /etc/waybar/style.css
exec-once = hyprpaper                # sfondo
exec-once = dunst                    # notifiche
exec-once = hypridle                 # idle / lock automatico
exec-once = /usr/libexec/wm-setup.sh # setup sessione Zena (homed, skel, etc.)

# --- Tasti: variabile modificatore ---
$mainMod = SUPER

# Finestre
bind = $mainMod,       Return, exec,          $terminal
bind = $mainMod,       Q,      killactive,
bind = $mainMod,       E,      exec,          $fileManager
bind = $mainMod,       R,      exec,          $launcher
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       P,      pseudo,
bind = $mainMod,       J,      togglesplit,
bind = $mainMod,       F,      fullscreen,    0
bind = $mainMod SHIFT, M,      exit,          # esci da Hyprland

# Lock screen
bind = $mainMod, L, exec, $lockScreen

# Screenshot area (richiede grimblast da ублю-os/packages o hyprland-contrib)
bind = , Print, exec, grimblast copy area

# Focus con frecce
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspace 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Sposta finestra nel workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scorri workspace con rotella del mouse tenendo SUPER
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Muovi / ridimensiona finestre con il mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume (tasti media)
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Luminosità (richiede brightnessctl)
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
